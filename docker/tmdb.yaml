Name: ms-tmdb-api
Host: 0.0.0.0
Port: 8888

# PostgreSQL 配置（请改成你的外部数据库地址）
Postgres:
  Host: "host.docker.internal"
  Port: 5432
  User: "postgres"
  Password: "postgres"
  DBName: "ms_tmdb"
  SSLMode: "disable"

# TMDB 配置（上线前请替换为你自己的密钥）
Tmdb:
  ApiKey: ""
  BaseURL: "https://api.themoviedb.org/3"
  DefaultLanguage: "zh-CN"
  RateLimit: 40

# 缓存配置
Cache:
  MovieTTL: 24
  TVTTL: 24
  PersonTTL: 48
